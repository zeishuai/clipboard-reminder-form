<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a84ff'/%3E%3Cpath d='M18 33l9 9 20-22' fill='none' stroke='white' stroke-width='7' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <title>创建提醒事项</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
      --accent: #0a84ff;
      --danger: #ff453a;
      --surface: rgba(127, 127, 127, 0.12);
      --border: rgba(127, 127, 127, 0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: max(20px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      background: Canvas;
      color: CanvasText;
    }
    main { width: min(100%, 560px); margin: 0 auto; }
    h1 { margin: 6px 0 8px; font-size: 28px; letter-spacing: -0.02em; }
    .intro { margin: 0 0 18px; color: GrayText; font-size: 15px; line-height: 1.5; }
    form { display: grid; gap: 12px; }
    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      padding: 14px;
    }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
    .row + .row { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    label, legend { font-size: 16px; font-weight: 600; }
    select, input[type="date"], input[type="time"] {
      min-height: 38px;
      max-width: 65%;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 6px 10px;
      background: Canvas;
      color: CanvasText;
      font: inherit;
    }
    input[type="checkbox"] { width: 44px; height: 26px; accent-color: var(--accent); }
    input:disabled { opacity: 0.45; }
    fieldset { border: 0; margin: 0; padding: 0; }
    legend { margin-bottom: 10px; }
    .segments { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .segments input { position: absolute; opacity: 0; pointer-events: none; }
    .segments label {
      text-align: center;
      padding: 9px 8px;
      border: 1px solid var(--border);
      border-radius: 9px;
      font-size: 15px;
      cursor: pointer;
    }
    .segments input:checked + label { color: white; border-color: var(--accent); background: var(--accent); }
    #form-error {
      display: none;
      margin: 0;
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--danger);
      background: color-mix(in srgb, var(--danger) 12%, transparent);
      line-height: 1.45;
    }
    #form-error.visible { display: block; }
    #submit-button {
      width: 100%;
      min-height: 48px;
      margin-top: 4px;
      border: 0;
      border-radius: 13px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-size: 17px;
      font-weight: 700;
    }
    #submit-button:disabled { opacity: 0.55; }
  </style>
</head>
<body>
  <main>
    <h1>创建提醒事项</h1>
    <p class="intro">在此页面一次完成设置。提醒事项标题不会传到网页或服务器。</p>

    <form id="reminder-form" novalidate>
      <section class="card">
        <div class="row">
          <label for="reminder-list">提醒事项文件夹</label>
          <select id="reminder-list" aria-label="提醒事项文件夹"></select>
        </div>
      </section>

      <section class="card">
        <div class="row">
          <label for="date-enabled">日期</label>
          <input id="date-enabled" type="checkbox" role="switch">
        </div>
        <div class="row">
          <label for="reminder-date">选择日期</label>
          <input id="reminder-date" type="date" disabled>
        </div>
        <div class="row">
          <label for="time-enabled">时间</label>
          <input id="time-enabled" type="checkbox" role="switch" disabled>
        </div>
        <div class="row">
          <label for="reminder-time">选择时间</label>
          <input id="reminder-time" type="time" disabled>
        </div>
      </section>

      <section class="card">
        <div class="row">
          <label for="urgent">是否紧急</label>
          <input id="urgent" type="checkbox" role="switch">
        </div>
      </section>

      <fieldset class="card">
        <legend>重要性</legend>
        <div class="segments">
          <input id="priority-low" type="radio" name="priority" value="low" checked>
          <label for="priority-low">低</label>
          <input id="priority-medium" type="radio" name="priority" value="medium">
          <label for="priority-medium">中</label>
          <input id="priority-high" type="radio" name="priority" value="high">
          <label for="priority-high">高</label>
        </div>
      </fieldset>

      <p id="form-error" role="alert">表单数据无效或已经损坏，请重新运行主快捷指令。</p>
      <button id="submit-button" type="submit">创建提醒事项</button>
    </form>
  </main>

  <script>
    "use strict";

    const CALLBACK_NAME = "剪切板创建提醒事项 Pro-提交";
    const form = document.getElementById("reminder-form");
    const listInput = document.getElementById("reminder-list");
    const dateEnabled = document.getElementById("date-enabled");
    const dateInput = document.getElementById("reminder-date");
    const timeEnabled = document.getElementById("time-enabled");
    const timeInput = document.getElementById("reminder-time");
    const urgentInput = document.getElementById("urgent");
    const submitButton = document.getElementById("submit-button");
    const formError = document.getElementById("form-error");
    let initialData = null;

    function decodeBase64URL(value) {
      const base64 = value.replace(/-/g, "+").replace(/_/g, "/");
      const padded = base64 + "=".repeat((4 - base64.length % 4) % 4);
      const binary = atob(padded);
      const bytes = Uint8Array.from(binary, character => character.charCodeAt(0));
      return JSON.parse(new TextDecoder().decode(bytes));
    }

    function isValidInitialization(data) {
      const uuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
      return Boolean(
        data &&
        uuid.test(data.nonce) &&
        Array.isArray(data.lists) &&
        data.lists.length > 0 &&
        data.lists.every(item => typeof item === "string" && item.trim() !== "") &&
        typeof data.defaultList === "string" &&
        data.lists.includes(data.defaultList) &&
        typeof data.dateEnabled === "boolean" &&
        typeof data.timeEnabled === "boolean" &&
        (!data.timeEnabled || data.dateEnabled) &&
        typeof data.urgent === "boolean" &&
        ["low", "medium", "high"].includes(data.priority)
      );
    }

    function showError(message) {
      formError.textContent = message;
      formError.classList.add("visible");
    }

    function syncDateTimeControls() {
      if (!dateEnabled.checked) {
        timeEnabled.checked = false;
      }
      dateInput.disabled = !dateEnabled.checked;
      timeEnabled.disabled = !dateEnabled.checked;
      timeInput.disabled = !dateEnabled.checked || !timeEnabled.checked;
    }

    function initialize() {
      try {
        const hash = location.hash;
        if (!hash.startsWith("#data=")) throw new Error("missing data fragment");
        const data = decodeBase64URL(hash.slice("#data=".length));
        if (!isValidInitialization(data)) throw new Error("invalid initialization data");
        initialData = data;

        data.lists.forEach(name => {
          const option = document.createElement("option");
          option.value = name;
          option.textContent = name;
          listInput.append(option);
        });
        listInput.value = data.defaultList;
        dateEnabled.checked = data.dateEnabled;
        timeEnabled.checked = data.timeEnabled;
        urgentInput.checked = data.urgent;
        document.querySelector(`input[name="priority"][value="${data.priority}"]`).checked = true;
        syncDateTimeControls();
      } catch (error) {
        showError("表单数据无效或已经损坏，请重新运行主快捷指令。");
        submitButton.disabled = true;
      }
    }

    dateEnabled.addEventListener("change", syncDateTimeControls);
    timeEnabled.addEventListener("change", syncDateTimeControls);

    form.addEventListener("submit", event => {
      event.preventDefault();
      if (!initialData || submitButton.disabled) return;

      if (dateEnabled.checked && !dateInput.value) {
        showError("请选择日期。");
        dateInput.focus();
        return;
      }
      if (dateEnabled.checked && timeEnabled.checked && !timeInput.value) {
        showError("请选择时间。");
        timeInput.focus();
        return;
      }

      formError.classList.remove("visible");
      const payload = {
        nonce: initialData.nonce,
        list: listInput.value,
        hasDate: dateEnabled.checked,
        date: dateEnabled.checked ? dateInput.value : "",
        hasTime: dateEnabled.checked && timeEnabled.checked,
        time: dateEnabled.checked && timeEnabled.checked ? timeInput.value : "",
        urgent: urgentInput.checked,
        priority: document.querySelector('input[name="priority"]:checked').value
      };

      submitButton.disabled = true;
      submitButton.textContent = "正在创建";
      const encodedName = encodeURIComponent(CALLBACK_NAME);
      const encodedPayload = encodeURIComponent(JSON.stringify(payload));
      const callbackURL = `shortcuts://run-shortcut?name=${encodedName}&input=text&text=${encodedPayload}`;
      window.location.href = callbackURL;
    });

    initialize();
  </script>
</body>
</html>
